<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación · Jairo & Cristina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --gold: #b8975a;
    --gold-light: #d4b47a;
    --dark: #1a1714;
    --warm-gray: #8a8178;
    --border: rgba(184,151,90,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }

  .card {
    position: relative;
    width: min(480px, 96vw);
    aspect-ratio: 9/16;
    background: var(--cream);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Subtle radial glow */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(184,151,90,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(184,151,90,0.07) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Church illustration */
  .church-bg {
    position: absolute;
    bottom: -1%;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    opacity: 0.08;
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* Gold border */
  .border-outer {
    position: absolute;
    inset: 16px;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  /* Corner diamonds */
  .corner-diamond {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.6;
  }
  .corner-diamond.tl { top: 12px; left: 12px; }
  .corner-diamond.tr { top: 12px; right: 12px; }
  .corner-diamond.bl { bottom: 12px; left: 12px; }
  .corner-diamond.br { bottom: 12px; right: 12px; }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    font-size: clamp(0.52rem, 1.6vw, 0.62rem);
    font-weight: 500;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .name-jairo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 11vw, 5.5rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--dark);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.35s;
  }

  .amp {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4vw, 2rem);
    font-style: italic;
    color: var(--gold);
    margin: 0.4rem 0;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.55s;
  }

  .name-cristina {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 11vw, 5.5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.04em;
    color: var(--dark);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.7s;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.8rem 0 1.6rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }
  .divider::before, .divider::after {
    content: '';
    display: block;
    width: 55px; height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .diamond { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }

  .date-block {
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.05s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  .date-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 9vw, 4rem);
    font-weight: 300;
    color: var(--dark);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .date-text {
    font-size: clamp(0.58rem, 1.8vw, 0.68rem);
    font-weight: 400;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--warm-gray);
  }

  .locations {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }

  .loc-line {
    font-size: clamp(0.58rem, 1.7vw, 0.68rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--warm-gray);
  }
  .loc-line strong { color: var(--dark); font-weight: 500; }

  .tagline {
    margin-top: 2.2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.9rem, 2.8vw, 1.1rem);
    font-style: italic;
    color: var(--warm-gray);
    letter-spacing: 0.03em;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.4s;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
