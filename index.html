<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jairo & Cristina — Confirmación de asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --gold: #b8975a;
    --gold-light: #d4b47a;
    --dark: #1a1714;
    --warm-gray: #8a8178;
    --border: rgba(184,151,90,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--dark); font-family:'Jost',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }

  /* ── HERO ── */
  .hero {
    position:relative; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:5rem 2rem 7rem; overflow:hidden; background:var(--cream);
  }
  .hero-church-img {
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:min(560px,88vw); opacity:0.13; pointer-events:none; z-index:0;
    mix-blend-mode:multiply;
  }
  .hero-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  .hero-eyebrow {
    font-size:0.68rem; font-weight:500; letter-spacing:0.38em; text-transform:uppercase;
    color:var(--gold); margin-bottom:2rem; opacity:0; animation:fadeUp 0.8s ease forwards 0.2s;
  }
  .hero-name-jairo {
    font-family:'Cormorant Garamond',serif; font-size:clamp(3.5rem,11vw,8rem);
    font-weight:300; line-height:1; letter-spacing:0.04em; color:var(--dark);
    opacity:0; animation:fadeUp 0.9s ease forwards 0.35s;
  }
  .hero-amp {
    font-family:'Cormorant Garamond',serif; font-size:clamp(1.4rem,4vw,2.4rem);
    font-style:italic; color:var(--gold); margin:0.4rem 0;
    opacity:0; animation:fadeUp 0.8s ease forwards 0.55s;
  }
  .hero-name-cristina {
    font-family:'Cormorant Garamond',serif; font-size:clamp(3.5rem,11vw,8rem);
    font-weight:300; font-style:italic; line-height:1; letter-spacing:0.04em; color:var(--dark);
    opacity:0; animation:fadeUp 0.9s ease forwards 0.7s;
  }
  .hero-divider {
    display:flex; align-items:center; gap:1rem; margin:1.8rem auto 1.4rem; width:fit-content;
    opacity:0; animation:fadeUp 0.8s ease forwards 0.9s;
  }
  .hero-divider::before,.hero-divider::after { content:''; display:block; width:55px; height:1px; background:var(--gold); opacity:0.6; }
  .hero-divider-diamond { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }
  .hero-date {
    font-family:'Cormorant Garamond',serif; font-size:clamp(1rem,3vw,1.35rem);
    font-style:italic; color:var(--warm-gray); letter-spacing:0.05em;
    opacity:0; animation:fadeUp 0.8s ease forwards 1.05s;
  }
  .hero-locations {
    margin-top:2rem; display:flex; flex-direction:column; gap:0.5rem;
    opacity:0; animation:fadeUp 0.8s ease forwards 1.2s;
  }
  .hero-loc { font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--warm-gray); }
  .hero-loc strong { color:var(--dark); font-weight:500; }
  .hero-scroll {
    position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:0.5rem;
    opacity:0; animation:fadeUp 0.8s ease forwards 1.5s; cursor:pointer;
  }
  .hero-scroll span { font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
  .scroll-line { width:1px; height:40px; background:linear-gradient(to bottom,var(--gold),transparent); animation:scrollPulse 2s ease-in-out infinite; }

  /* ── FORM SECTION ── */
  .form-section { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:5rem 2rem 6rem; }
  .section-label { font-size:0.65rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); text-align:center; margin-bottom:1rem; }
  .section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,3rem); font-weight:300; text-align:center; color:var(--dark); margin-bottom:1rem; line-height:1.2; }
  .section-title em { font-style:italic; color:var(--gold); }
  .section-subtitle { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-style:italic; color:var(--warm-gray); text-align:center; margin-bottom:3rem; line-height:1.6; padding:0 1rem; }

  /* ── CARDS ── */
  .form-card { background:rgba(255,255,255,0.55); border:1px solid var(--border); border-radius:2px; padding:2rem 2.2rem; margin-bottom:1.5rem; backdrop-filter:blur(8px); transition:border-color 0.3s,box-shadow 0.3s; }
  .form-card:hover { border-color:rgba(184,151,90,0.55); box-shadow:0 4px 30px rgba(184,151,90,0.08); }
  .card-header { display:flex; align-items:flex-start; gap:1rem; margin-bottom:0.6rem; }
  .card-num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-style:italic; color:var(--gold); line-height:1; min-width:1.5rem; }
  .card-title-wrap { display:flex; flex-direction:column; gap:0.2rem; }
  .card-title { font-size:0.7rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--warm-gray); }
  .card-caption { font-family:'Cormorant Garamond',serif; font-size:0.95rem; font-style:italic; color:var(--warm-gray); line-height:1.5; margin-bottom:1.2rem; }

  /* PALACE IMAGE STRIP */
  .palace-strip { width:calc(100% + 4.4rem); margin-left:-2.2rem; margin-right:-2.2rem; margin-top:1.8rem; margin-bottom:-2rem; overflow:hidden; }
  .palace-strip img { width:100%; height:auto; display:block; filter:grayscale(100%) contrast(0.9); opacity:0.55; }

  /* CUENTA BANCARIA */
  .cuenta-display {
    background:rgba(184,151,90,0.06); border:1px dashed var(--gold); border-radius:2px;
    padding:1.2rem 1.5rem; text-align:center; margin-top:0.5rem;
  }
  .cuenta-label { font-size:0.65rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--warm-gray); margin-bottom:0.5rem; }
  .cuenta-iban { font-family:'Cormorant Garamond',serif; font-size:1.3rem; letter-spacing:0.12em; color:var(--dark); }
  .cuenta-titular { font-size:0.75rem; color:var(--warm-gray); margin-top:0.3rem; letter-spacing:0.05em; }

  /* INPUTS */
  .field-group { margin-bottom:1.2rem; }
  .field-group:last-child { margin-bottom:0; }
  label { display:block; font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--warm-gray); margin-bottom:0.5rem; }
  input[type="text"],input[type="email"],input[type="tel"],textarea,select {
    width:100%; background:rgba(255,255,255,0.7); border:1px solid var(--border); border-radius:1px;
    padding:0.75rem 1rem; font-family:'Jost',sans-serif; font-size:0.9rem; font-weight:300;
    color:var(--dark); transition:border-color 0.2s,box-shadow 0.2s; outline:none; appearance:none;
  }
  input:focus,textarea:focus,select:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,151,90,0.1); }
  textarea { resize:vertical; min-height:80px; }

  /* MEMBERS */
  .members-list { display:flex; flex-direction:column; gap:0.8rem; }
  .member-row { display:grid; grid-template-columns:1fr auto auto; gap:0.6rem; align-items:center; animation:fadeIn 0.3s ease; }
  .member-row input { margin:0; }
  .member-type { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--warm-gray); white-space:nowrap; padding:0 0.3rem; }
  .btn-remove { background:none; border:1px solid rgba(184,151,90,0.3); border-radius:1px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--warm-gray); font-size:1.1rem; transition:all 0.2s; flex-shrink:0; }
  .btn-remove:hover { border-color:var(--gold); color:var(--gold); }
  .btn-add-member { background:none; border:1px dashed var(--border); border-radius:1px; width:100%; padding:0.6rem; font-family:'Jost',sans-serif; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); cursor:pointer; margin-top:0.5rem; transition:all 0.2s; }
  .btn-add-member:hover { background:rgba(184,151,90,0.05); border-color:var(--gold); }

  /* OPTIONS */
  .option-group { display:flex; gap:0.8rem; flex-wrap:wrap; }
  .option-btn { background:rgba(255,255,255,0.6); border:1px solid var(--border); border-radius:1px; padding:0.55rem 1.1rem; font-family:'Jost',sans-serif; font-size:0.75rem; letter-spacing:0.1em; color:var(--warm-gray); cursor:pointer; transition:all 0.2s; user-select:none; }
  .option-btn:hover { border-color:var(--gold-light); color:var(--dark); }
  .option-btn.selected { background:var(--gold); border-color:var(--gold); color:white; }

  /* ALLERGY */
  .allergy-list { display:flex; flex-direction:column; gap:0.6rem; }
  .allergy-row { animation:fadeIn 0.3s ease; }

  /* MENU INFANTIL OPCIONES */
  .menu-infantil-opciones { display:flex; flex-direction:column; gap:0.8rem; margin-bottom:0.5rem; }
  .menu-opcion { background:rgba(184,151,90,0.05); border-left:2px solid var(--gold); padding:0.8rem 1rem; border-radius:0 2px 2px 0; }
  .menu-opcion-title { font-family:'Jost',sans-serif; font-size:0.8rem; font-weight:500; color:var(--dark); margin-bottom:0.3rem; letter-spacing:0.05em; }
  .menu-opcion-desc { font-size:0.8rem; color:var(--warm-gray); line-height:1.5; }
  .menu-infantil-row { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; align-items:center; }

  /* BUS */
  .bus-options { display:flex; flex-direction:column; gap:1rem; }
  .bus-option-label { font-size:0.75rem; color:var(--dark); margin-bottom:0.4rem; font-weight:400; }

  /* SUBMIT */
  .submit-wrap { text-align:center; margin-top:3rem; }
  .btn-submit { background:var(--dark); border:none; color:var(--cream); font-family:'Jost',sans-serif; font-size:0.75rem; font-weight:500; letter-spacing:0.3em; text-transform:uppercase; padding:1.1rem 3.5rem; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; }
  .btn-submit::before { content:''; position:absolute; inset:0; background:var(--gold); transform:translateX(-100%); transition:transform 0.4s ease; }
  .btn-submit:hover::before { transform:translateX(0); }
  .btn-submit span { position:relative; z-index:1; }

  /* SUCCESS */
  .success-panel { display:none; text-align:center; padding:4rem 2rem; }
  .success-panel.visible { display:block; animation:fadeUp 0.6s ease; }
  .success-icon { font-size:3rem; margin-bottom:1.5rem; }
  .success-title { font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:300; margin-bottom:1rem; }
  .success-msg { color:var(--warm-gray); font-size:0.9rem; line-height:1.7; }

  /* INFO SECTION */
  .info-section { position:relative; z-index:1; background:rgba(26,23,20,0.03); border-top:1px solid var(--border); padding:5rem 2rem 4rem; }
  .info-inner { max-width:680px; margin:0 auto; }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-top:2rem; }
  .info-card { background:rgba(255,255,255,0.6); border:1px solid var(--border); border-radius:2px; padding:1.5rem; }
  .info-icon { font-size:1.8rem; margin-bottom:0.8rem; }
  .info-card-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:400; color:var(--dark); margin-bottom:0.6rem; line-height:1.3; }
  .info-card-body { font-size:0.82rem; color:var(--warm-gray); line-height:1.7; }
  .info-card-body strong { color:var(--dark); font-weight:500; }
  @media(max-width:600px) { .info-grid { grid-template-columns:1fr; } }

  /* FOOTER */
  footer { text-align:center; padding:2rem; border-top:1px solid var(--border); font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--warm-gray); }

  /* ANIMATIONS */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes scrollPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  @media(max-width:600px) {
    .allergy-row { grid-template-columns:1fr auto; }
    .allergy-row input:nth-child(2) { display:none; }
  }
</style>
</head>
